<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC Manual Viewer — 連絡事項・マニュアル</title>
  <base href="/20260419_notice-board_no-icon/">
  <link rel="stylesheet" href="src/styles.css">
  <style>
    .top-section {
      margin-bottom: 2rem;
      margin-top: 1.75rem;
    }

    .top-section:first-child { margin-top: 1.5rem; }

    .select-prompt {
      text-align: center;
      margin-bottom: 1rem;
    }

    .select-prompt p {
      font-family: var(--serif);
      font-size: 0.85rem;
      color: var(--text-sub);
      font-weight: 400;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="../" class="nav-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M10 12l-4-4 4-4"/>
      </svg>
      ギャラリーへ
    </a>
    <div class="nav-breadcrumb">
      <span>連絡事項ストック管理 UX（アイコンなし）</span>
    </div>
    <span class="navbar-title">FC Manual</span>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-ornament">
      <span class="hero-ornament-line"></span>
      <span class="hero-ornament-dot"></span>
      <span class="hero-ornament-dot"></span>
      <span class="hero-ornament-dot"></span>
      <span class="hero-ornament-line"></span>
    </div>
    <p class="hero-label">FC Manual Viewer</p>
    <h1 class="hero-title">味和商店<br>スタッフポータル</h1>
    <p class="hero-subtitle">マニュアル・連絡事項を確認できます</p>
  </div>

  <!-- Main -->
  <main class="page-main">

    <!-- 緊急連絡バナー（JS で注入） -->
    <div id="urgent-area"></div>

    <!-- 連絡事項リンク -->
    <div class="top-section">
      <div class="section-header">
        <h2 class="section-title">連絡事項</h2>
      </div>
      <a class="notices-link-block" href="notices/">
        <div class="notices-link-block-left">
          <div>
            <div class="notices-link-label">連絡事項一覧</div>
            <div class="notices-link-sub" id="notices-count-label">本部からのお知らせを確認する</div>
          </div>
        </div>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </a>
    </div>

    <!-- 業態一覧 -->
    <div class="top-section">
      <div class="section-header">
        <h2 class="section-title">業態一覧</h2>
        <span style="font-size:0.72rem;color:var(--text-muted);">マニュアルを開く</span>
      </div>

      <div class="select-prompt">
        <div class="divider"></div>
        <p>ご担当の業態を選ぶと、そのままマニュアル一覧へ進めます</p>
        <div class="divider"></div>
      </div>

      <div class="brand-grid" id="brand-grid">
        <!-- JS で生成 -->
      </div>
    </div>

  </main>

  <script src="src/main.js"></script>
  <script>
    (() => {
    const { BRANDS, NOTICES } = window.AppData;
    const { escHtml, priorityMeta, formatDate } = window.AppUtils;

    // 緊急連絡バナー（urgent が存在する場合のみ表示）
    const urgentNotices = NOTICES.filter(n => n.priority === 'urgent');
    const urgentArea = document.getElementById('urgent-area');

    if (urgentNotices.length > 0) {
      const n = urgentNotices[0];
      const pm = priorityMeta(n.priority);
      urgentArea.innerHTML = `
        <a class="urgent-banner" href="notice-detail/?id=${escHtml(n.id)}">
          <div class="urgent-banner-header">
            <span class="priority-badge ${escHtml(pm.class)}">${escHtml(pm.label)}</span>
            <span class="urgent-banner-title">${escHtml(n.title)}</span>
          </div>
          <p class="urgent-banner-summary">${escHtml(n.summary)}</p>
          <div class="urgent-banner-meta">${escHtml(formatDate(n.date))} — ${escHtml(n.author)}</div>
        </a>
      `;
    }

    // 連絡件数ラベル
    const countLabel = document.getElementById('notices-count-label');
    const urgentCount = NOTICES.filter(n => n.priority === 'urgent').length;
    const importantCount = NOTICES.filter(n => n.priority === 'important').length;
    const parts = [];
    if (urgentCount > 0) parts.push(`緊急 ${urgentCount}件`);
    if (importantCount > 0) parts.push(`重要 ${importantCount}件`);
    if (parts.length > 0) {
      countLabel.textContent = parts.join(' / ') + ` — 全 ${NOTICES.length}件`;
    } else {
      countLabel.textContent = `全 ${NOTICES.length}件の連絡事項を確認できます`;
    }

    // ブランドグリッド
    const grid = document.getElementById('brand-grid');
    grid.innerHTML = BRANDS.map(b => `
      <a class="brand-card" href="../20260403_viewer-ux_basic-flow/?brand=${escHtml(b.slug)}">
        <h2 class="brand-name">${escHtml(b.name)}</h2>
        <p class="brand-desc">${escHtml(b.description)}</p>
        <div class="brand-card-footer">
          <span class="arrow-cta">
            この業態を開く
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
          </span>
        </div>
      </a>
    `).join('');
    })();
  </script>

</body>
</html>
