<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブランド選択 — FC Manual Viewer</title>
  <link rel="stylesheet" href="src/styles.css">
  <style>
    /* ページ固有スタイル */
    .hero {
      background-color: var(--primary);
      text-align: center;
      padding: 4rem 2rem 3.5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 145, 74, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
    }

    .hero-mon {
      font-size: 2.5rem;
      margin-bottom: 1.25rem;
      line-height: 1;
    }

    .hero-label {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .hero-title {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 300;
      color: var(--ivory);
      letter-spacing: 0.08em;
      line-height: 1.4;
      margin-bottom: 0.75rem;
    }

    .hero-subtitle {
      font-family: var(--sans);
      font-size: 0.78rem;
      color: rgba(253, 248, 240, 0.6);
      font-weight: 300;
      letter-spacing: 0.08em;
    }

    .select-prompt {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .select-prompt p {
      font-family: var(--serif);
      font-size: 0.9rem;
      color: var(--text-sub);
      font-weight: 400;
      letter-spacing: 0.08em;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: var(--gold);
      margin: 0.75rem auto;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="../../index.html" class="nav-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M10 12l-4-4 4-4"/>
      </svg>
      ギャラリーへ
    </a>
    <div class="nav-breadcrumb">
      <span>マニュアル閲覧 UX 基本フロー</span>
    </div>
    <span class="navbar-title">FC Manual Viewer</span>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-mon">⛩</div>
    <p class="hero-label">FC Manual Viewer</p>
    <h1 class="hero-title">オペレーション<br>マニュアル</h1>
    <p class="hero-subtitle">業態を選択してください</p>
  </div>

  <!-- Main -->
  <main class="page-main">
    <div class="select-prompt">
      <div class="divider"></div>
      <p>ご担当の業態をお選びください</p>
      <div class="divider"></div>
    </div>

    <div class="brand-grid" id="brand-grid">
      <!-- JS で生成 -->
    </div>
  </main>

  <script src="src/main.js"></script>
  <script>
    const { BRANDS } = window.AppData;
    const { escHtml } = window.AppUtils;

    const grid = document.getElementById('brand-grid');
    grid.innerHTML = BRANDS.map(b => `
      <a class="brand-card" href="category.html?brand=${escHtml(b.slug)}">
        <div class="brand-icon">${b.icon}</div>
        <h2 class="brand-name">${escHtml(b.name)}</h2>
        <p class="brand-desc">${escHtml(b.description).replace(/\n/g, '<br>')}</p>
        <div class="brand-card-footer">
          <span class="arrow-cta">
            カテゴリへ
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
          </span>
        </div>
      </a>
    `).join('');
  </script>

</body>
</html>
