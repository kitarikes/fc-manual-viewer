<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マニュアル閲覧 — FC Manual Viewer</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-root"></div>

  <!-- Viewer Layout (navbar の下全体を占有) -->
  <div class="viewer-wrap" id="viewer-wrap">
    <!-- 左：動画ペイン -->
    <div class="video-pane" id="video-pane">
      <div class="video-header" id="video-header">
        <p class="loading">読み込み中…</p>
      </div>
      <div class="video-frame-wrap" id="video-frame-wrap">
        <!-- iframe or placeholder がここに入る -->
      </div>
      <!-- モバイル用ステップタブ -->
      <div class="step-tabs-mobile" id="step-tabs-mobile"></div>
    </div>

    <!-- 右：ステップペイン（PC/タブレット） -->
    <div class="steps-pane" id="steps-pane">
      <div class="steps-pane-header">
        <p class="steps-pane-label">Steps</p>
        <p class="steps-pane-title" id="steps-pane-title">手順</p>
      </div>
      <div class="steps-list-inner" id="steps-list-inner"></div>
    </div>
  </div>

  <!-- モバイル用ステップ詳細（viewer-wrap の外、通常フロー） -->
  <div class="mobile-step-detail" id="mobile-step-detail"></div>

  <script src="src/main.js"></script>
  <script>
    const { BRANDS, CATEGORIES, MOVIES, SEQUENCES } = window.AppData;
    const { getParam, escHtml, difficultyLabel, formatDuration } = window.AppUtils;

    // ---- URL params ----
    const brandSlug    = getParam('brand');
    const categorySlug = getParam('category');
    const movieId      = getParam('movie');

    const brand    = BRANDS.find(b => b.slug === brandSlug);
    const category = CATEGORIES.find(c => c.slug === categorySlug && c.brandId === brand?.id);
    const movie    = MOVIES.find(m => m.id === movieId && m.categoryId === category?.id);
    const sequences = SEQUENCES[movieId] || [];

    let currentStep = 0;

    // ---- Error guard ----
    if (!brand || !category || !movie) {
      renderError();
    } else {
      renderViewer();
    }

    // ============================================================
    // Main render
    // ============================================================
    function renderViewer() {
      document.title = `${movie.title} — FC Manual Viewer`;

      // Navbar
      document.getElementById('navbar-root').innerHTML = `
        <nav class="navbar">
          <a href="index.html?brand=${escHtml(brandSlug)}&category=${escHtml(categorySlug)}"
             class="nav-back">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 12l-4-4 4-4"/>
            </svg>
            一覧へ戻る
          </a>
          <div class="nav-breadcrumb">
            <span class="nav-brand-name">${escHtml(brand.name)}</span>
            <span class="sep"> › </span>
            <span class="nav-brand-name">${escHtml(category.name)}</span>
            <span class="sep"> › </span>
            <span class="nav-current">${escHtml(movie.title)}</span>
          </div>
          <span class="navbar-title">FC Manual Viewer</span>
        </nav>`;

      // Video header
      document.getElementById('video-header').innerHTML = `
        <p class="video-category-label">${escHtml(category.icon)} ${escHtml(category.name)}</p>
        <h1 class="video-title">${escHtml(movie.title)}</h1>
        <div class="video-meta">
          <span class="movie-difficulty difficulty-${movie.difficulty}">
            ${difficultyLabel(movie.difficulty)}
          </span>
          <span class="video-meta-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/>
            </svg>
            約${movie.estimatedMinutes}分
          </span>
          <span class="video-meta-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2 4h12M2 8h8M2 12h5"/>
            </svg>
            ${sequences.length}ステップ
          </span>
        </div>`;

      // Steps pane heading
      document.getElementById('steps-pane-title').textContent =
        `手順（${sequences.length}ステップ）`;

      // Steps list (PC/タブレット右ペイン)
      document.getElementById('steps-list-inner').innerHTML =
        sequences.map((s, i) => buildStepItem(s, i)).join('');

      // Mobile tabs
      document.getElementById('step-tabs-mobile').innerHTML =
        sequences.map((s, i) => `
          <button class="step-tab-btn${i === 0 ? ' active' : ''}"
                  onclick="selectStep(${i})"
                  aria-label="ステップ${s.stepNumber}">
            ${s.stepNumber}
          </button>
        `).join('');

      // Initial render
      selectStep(0, /* skipIframe */ false);
    }

    // ============================================================
    // Step selection
    // ============================================================
    function selectStep(index, skipIframe) {
      currentStep = index;
      const seq = sequences[index];
      if (!seq) return;

      // ---- iframe 更新 ----
      updateIframe(seq.videoId);

      // ---- PC ステップリスト ----
      document.querySelectorAll('.step-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      // ---- モバイルタブ ----
      document.querySelectorAll('.step-tab-btn').forEach((el, i) => {
        el.classList.toggle('active', i === index);
        // 選択タブを中央へスクロール
        if (i === index) {
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      });

      // ---- モバイル詳細 ----
      renderMobileDetail(seq);
    }

    // ============================================================
    // iframe 生成・更新
    // ============================================================
    function updateIframe(videoId) {
      const wrap = document.getElementById('video-frame-wrap');

      if (!videoId || videoId.startsWith('PLACEHOLDER')) {
        // プレースホルダー表示
        wrap.innerHTML = `
          <div class="video-placeholder">
            <div class="video-placeholder-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </div>
            <p class="video-placeholder-text">
              この手順の動画は<br>準備中です
            </p>
          </div>`;
      } else {
        // YouTube embed
        // allowfullscreen は属性のみ（値なし）で正しく動作する
        wrap.innerHTML = `
          <iframe
            id="video-frame"
            src="https://www.youtube.com/embed/${escHtml(videoId)}?rel=0&modestbranding=1"
            title="${escHtml(sequences[currentStep]?.title ?? '')}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>`;
      }
    }

    // ============================================================
    // Build step item HTML (PC右ペイン)
    // ============================================================
    function buildStepItem(s, i) {
      const warnHtml = s.warnings && s.warnings.length > 0
        ? `<div class="warnings-box">
             <p class="warnings-label">注意事項</p>
             <ul class="warnings-list">
               ${s.warnings.map(w => `<li>${escHtml(w)}</li>`).join('')}
             </ul>
           </div>`
        : '';

      const kpHtml = s.keyPoints && s.keyPoints.length > 0
        ? `<p class="keypoints-label">習得ポイント</p>
           <ul class="keypoints-list">
             ${s.keyPoints.map(k => `<li>${escHtml(k)}</li>`).join('')}
           </ul>`
        : '';

      return `
        <div class="step-item${i === 0 ? ' active' : ''}" onclick="selectStep(${i})">
          <div class="step-item-header">
            <div class="step-num">${String(s.stepNumber).padStart(2, '0')}</div>
            <div class="step-item-info">
              <p class="step-item-title">${escHtml(s.title)}</p>
              <p class="step-item-dur">${formatDuration(s.durationSeconds)}</p>
            </div>
            <div class="step-item-chevron">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 6l4 4 4-4"/>
              </svg>
            </div>
          </div>
          <div class="step-item-body">
            <p class="step-description">${escHtml(s.description)}</p>
            ${kpHtml}
            ${warnHtml}
          </div>
        </div>`;
    }

    // ============================================================
    // Mobile detail area
    // ============================================================
    function renderMobileDetail(s) {
      const warnHtml = s.warnings && s.warnings.length > 0
        ? `<div class="warnings-box">
             <p class="warnings-label">注意事項</p>
             <ul class="warnings-list">
               ${s.warnings.map(w => `<li>${escHtml(w)}</li>`).join('')}
             </ul>
           </div>`
        : '';

      const kpHtml = s.keyPoints && s.keyPoints.length > 0
        ? `<p class="keypoints-label">習得ポイント</p>
           <ul class="keypoints-list">
             ${s.keyPoints.map(k => `<li>${escHtml(k)}</li>`).join('')}
           </ul>`
        : '';

      document.getElementById('mobile-step-detail').innerHTML = `
        <div class="mobile-step-num-row">
          <span class="mobile-step-num">${String(s.stepNumber).padStart(2, '0')}</span>
          <span class="mobile-step-dur">${formatDuration(s.durationSeconds)}</span>
        </div>
        <p class="mobile-step-title">${escHtml(s.title)}</p>
        <p class="step-description">${escHtml(s.description)}</p>
        ${kpHtml}
        ${warnHtml}`;
    }

    // ============================================================
    // Error
    // ============================================================
    function renderError() {
      document.getElementById('navbar-root').innerHTML = `
        <nav class="navbar">
          <a href="index.html" class="nav-back">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 12l-4-4 4-4"/>
            </svg>
            トップへ
          </a>
          <span class="navbar-title">FC Manual Viewer</span>
        </nav>`;

      document.getElementById('viewer-wrap').innerHTML =
        '<p class="loading">マニュアルが見つかりませんでした。<br>'
        + '<a href="index.html" style="color:var(--gold)">トップへ戻る</a></p>';
    }

    // グローバル公開
    window.selectStep = selectStep;
  </script>

</body>
</html>
